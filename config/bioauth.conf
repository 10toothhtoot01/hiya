# BioAuth Configuration
# /etc/bioauth/bioauth.conf
#
# This file configures the BioAuth fingerprint authentication daemon.
# Lines starting with # are comments.
# Settings use KEY = VALUE format.

[general]
# Log level: error, warning, info, debug, trace
log_level = info

# Maximum number of concurrent sessions
max_sessions = 64

# Session timeout in seconds (auto-expire)
session_timeout = 300

# Idle timeout for unlocked vaults in seconds (0 disables auto-lock)
vault_idle_timeout = 1800

[fingerprint]
# Maximum enrollment attempts before lockout
max_enroll_attempts = 10

# Maximum enrollments per user (across all fingers)
max_enrollments = 10

# Rate limiting: max failed verifications before lockout
rate_limit_max_attempts = 5

# Rate limiting: lockout duration in seconds
rate_limit_lockout = 30

# Rate limiting: sliding window size in seconds
rate_limit_window = 60

[face]
# Howdy executable (can be absolute path to your custom build)
howdy_binary = howdy

[tpm]
# Enable TPM integration in daemon
tpm_enabled = true

# Require TPM for enrollment/verification.
# If true, plaintext template fallback is denied.
require_tpm = false

# Allow plaintext template fallback if TPM unseal fails.
# Ignored when require_tpm=true.
tpm_fallback_to_plaintext = false

# Optional PCR policy binding for template unseal
tpm_pcr_binding = false
tpm_pcr_index = 7

# TPM device path
device = /dev/tpmrm0

# Optional explicit TPM key namespace for BioAuth
primary_handle = 0x81000100

# Persistent handle for BioAuth primary key
primary_handle = 0x81000100

[fido2]
# Enable FIDO2/CTAP2 platform authenticator
enabled = true

# Credential storage path
storage_path = /var/lib/bioauth/fido2

# Maximum stored resident credentials
max_credentials = 64

[pam]
# Verification timeout in seconds (how long to wait for finger)
verify_timeout = 30

# If true, return PAM_IGNORE when no device available (allow password fallback)
# If false, return PAM_AUTH_ERR (strict mode)
fallback = true

# Enable debug logging to syslog
debug = false
