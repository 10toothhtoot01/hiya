<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE busconfig PUBLIC
  "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
  "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">

<!--
  D-Bus policy configuration for BioAuth Manager
  Install to: /etc/dbus-1/system.d/org.bioauth.Manager.conf
-->

<busconfig>
  <!-- Only root can own the service name -->
  <policy user="root">
    <allow own="org.bioauth.Manager"/>
              <allow own="org.bioauth.Vault"/>
              <allow own="org.bioauth.Daemon"/>
    <allow send_destination="org.bioauth.Manager"
           send_interface="org.bioauth.Manager"
           send_member="ClearDevice"/>
    <allow send_destination="org.bioauth.Manager"
           send_interface="org.bioauth.Manager"
           send_member="VerifyUser"/>
  </policy>

  <!-- Allow any user to call methods on the interface -->
  <policy context="default">
    <allow send_destination="org.bioauth.Manager"
           send_interface="org.bioauth.Manager"
           send_member="GetDevices"/>

    <allow send_destination="org.bioauth.Manager"
           send_interface="org.bioauth.Manager"
           send_member="CreateSession"/>

    <allow send_destination="org.bioauth.Manager"
           send_interface="org.bioauth.Manager"
           send_member="GetEnrolledFingers"/>

    <allow send_destination="org.bioauth.Manager"
           send_interface="org.bioauth.Manager"
           send_member="Enroll"/>

    <allow send_destination="org.bioauth.Manager"
           send_interface="org.bioauth.Manager"
           send_member="DeleteEnrollment"/>

    <allow send_destination="org.bioauth.Manager"
           send_interface="org.bioauth.Manager"
           send_member="Verify"/>

    <allow send_destination="org.bioauth.Manager"
           send_interface="org.bioauth.Manager"
           send_member="GetPreferences"/>

    <allow send_destination="org.bioauth.Manager"
           send_interface="org.bioauth.Manager"
           send_member="SetPreferences"/>

    <allow send_destination="org.bioauth.Daemon"
           send_interface="org.bioauth.Auth"/>

    <allow send_destination="org.bioauth.Daemon"
           send_interface="org.bioauth.Enroll"/>

    <!-- Allow introspection -->
    <allow send_destination="org.bioauth.Manager"
           send_interface="org.freedesktop.DBus.Introspectable"
           send_member="Introspect"/>


    <allow send_destination="org.bioauth.Daemon"
           send_interface="org.freedesktop.DBus.Introspectable"
           send_member="Introspect"/>

    <allow send_destination="org.bioauth.Manager"
           send_interface="org.freedesktop.DBus.Properties"
           send_member="Get"/>


    <allow send_destination="org.bioauth.Daemon"
           send_interface="org.freedesktop.DBus.Properties"
           send_member="Get"/>

    <allow send_destination="org.bioauth.Manager"
           send_interface="org.freedesktop.DBus.Properties"
           send_member="GetAll"/>


    <allow send_destination="org.bioauth.Daemon"
           send_interface="org.freedesktop.DBus.Properties"
           send_member="GetAll"/>
  </policy>
</busconfig>
